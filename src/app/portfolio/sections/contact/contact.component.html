<div class="section-container contact-container">
  <div class="contact-left">
    <button class="logo bg-blue text-white" routerLink="/" fragment="">
      <img src="/assets/Logo_white.svg" alt="Logo de Hernando Rumbo" width="32" height="32">
    </button>

    <div class="contact-info">
      <p class="name">{{ sectionData.name }}</p>
      <p class="location">{{ sectionData.location }}</p>
    </div>
  </div>

  <div class="contact-center">
    <p class="title" appTypewrite 
                [text]="sectionData.title" 
                [speed]="240" [loopDelay]="5000" 
                [deleteSpeed]="100"></p>
    <p class="subtitle">{{ sectionData.subtitle }}</p>

    <div class="social-medias-container">
      <a *ngFor="let item of socialMedias"
         class="a-icons"
         [href]="item.link"
         [target]="item.newTab ? '_blank' : ''"
         [attr.aria-label]="item.ariaLabel">
        <i [class]="item.icon"></i>
      </a>
    </div>
  </div>

  <div class="contact-right">
    <p class="note">{{ sectionData.note }}</p>
  </div>
</div>
